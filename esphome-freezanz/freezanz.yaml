esphome:
  # Hostname for the device; mac_suffix differentiates multiple units
  name: espfreezanz
  friendly_name: Freezanz
  on_boot:
    priority: 600
    then:
      - script.execute: rtc_read_time
      - lambda: |-
          // Restore LED state based on device_on global
          if (id(device_on)) {
            id(sw_led_green_d7).turn_on();
            ESP_LOGI("boot", "Device was ON, restoring LED green D7");
          } else {
            id(sw_led_green_d7).turn_off();
            ESP_LOGI("boot", "Device was OFF, LED green D7 stays off");
          }

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging via UART
logger:

# default HA integration, OTA updater and backup http web portal
api:
  # TODO increase the security
  # password: !secret device_password
  #encryption:
  #  key: "YOUR_ENCRYPTION_KEY"
  # 5m default delay. if no home assistant, then force reboot
  reboot_timeout: 0s

# OTA update support
ota:
  - platform: esphome
  # TODO increase the security
  # password: !secret device_password
  # change to https://esphome.io/components/ota/http_request ?

wifi:
  networks:
    - ssid: !secret wifi_1_ssid
      password: !secret wifi_1_password
    - ssid: !secret wifi_2_ssid
      password: !secret wifi_2_password
  post_connect_roaming: true
  on_connect:
    then:
      - switch.turn_on: sw_led_blue_d3
  on_disconnect:
    then:
      - switch.turn_off: sw_led_blue_d3

# Local diagnostic web portal
web_server:
  port: 80
  version: 3

# ---------------------------------------------------------------------------
# UTILITY
# ---------------------------------------------------------------------------

# Test controls
button:
  - platform: restart
    name: "ESPHome Restart"
    entity_category: "config"
  - platform: template
    name: "Clear Stored States"
    id: clear_states_button
    icon: "mdi:database-remove"
    entity_category: "config"
    on_press:
      then:
        - lambda: |-
            global_preferences->reset();
            ESP_LOGI("custom", "NVM Memory Cleared! Restarting...");
        - delay: 1s
        # This is the correct way to reboot via code
        - lambda: 'App.safe_reboot();'

  - platform: output
    name: "SW ON⁄OFF"
    id: sw_onoff_switch
    output: sw_onoff
    duration: 200ms
    entity_category: ""

  - platform: template
    name: "SW Pump ON⁄OFF"
    id: sw_pump_on_switch
    entity_category: ""
    on_press:
      then:
        - lambda: |-
            if (!id(device_on)) {
              ESP_LOGW("pump", "Device is OFF, blocking pump activation");
              return;
            }
            if (id(action_running)) {
              ESP_LOGI("pump", "Pump running — stopping");
              id(pump_start).stop();
              id(pump_stop).stop();
              id(pump_force_stop).execute();
              return;
            }
            id(pump_start).execute();

  - platform: template
    name: "Buzzer ON sequence"
    entity_category: "diagnostic"
    on_press:
      then:
        - script.execute: buzzer_on_sequence

  - platform: template
    name: "Buzzer OFF sequence"
    entity_category: "diagnostic"
    on_press:
      then:
        - script.execute: buzzer_off_sequence

  - platform: template
    name: "Buzzer Alarm sequence"
    entity_category: "diagnostic"
    on_press:
      then:
        - script.execute: buzzer_start_sequence

  - platform: template
    name: "Buzzer Stop sequence"
    entity_category: "diagnostic"
    on_press:
      then:
        - script.execute: buzzer_stop_sequence

text_sensor:
  - platform: version
    name: "Freezanz ESPHome Version"
    icon: mdi:information
    hide_timestamp: true

  - platform: wifi_info
    ip_address:
      name: "Freezanz IP Address"
    mac_address:
      name: "Freezanz MAC Address"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal (RSSI)"
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: template
    name: "GPIO5 P1 Low Count"
    id: water_flow_missing_counter_sensor
    lambda: return id(water_flow_missing_counter);
    update_interval: 10s
    accuracy_decimals: 0
    unit_of_measurement: "events"
    entity_category: "diagnostic"

  # GPIO36 (SENSOR_VP) — input-only ADC, no pullup available
  - platform: adc
    pin: GPIO36
    name: "Debug ADC GPIO36 VP"
    id: debug_adc36
    update_interval: 5s
    attenuation: 11db
    entity_category: "diagnostic"

  # GPIO39 (SENSOR_VN) — input-only ADC, no pullup available
  - platform: adc
    pin: GPIO39
    name: "Debug ADC GPIO39 VN"
    id: debug_adc39
    update_interval: 5s
    attenuation: 11db
    entity_category: "diagnostic"

  # GPIO34 — input-only ADC (footprint D5, unpopulated)
  - platform: adc
    pin: GPIO34
    name: "Debug ADC GPIO34"
    id: debug_adc34
    update_interval: 5s
    attenuation: 11db
    entity_category: "diagnostic"

  # GPIO35 — input-only ADC (footprint D45, unpopulated)
  - platform: adc
    pin: GPIO35
    name: "Debug ADC GPIO35"
    id: debug_adc35
    update_interval: 5s
    attenuation: 11db
    entity_category: "diagnostic"

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Rome"
    on_time_sync:
      then:
        - script.execute: rtc_write_time

binary_sensor:
  # SW2 — ON/OFF button (GPIO33, active LOW, internal pull-up)
  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button ON⁄OFF"
    entity_category: ""
    id: btn_onoff
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - lambda: |-
            // Toggle device_on state
            id(device_on) = !id(device_on);
            if (id(device_on)) {
              id(sw_led_green_d7).turn_on();
              id(buzzer_on_sequence).execute();
              ESP_LOGI("onoff", "Device ON");
            } else {
              id(sw_led_green_d7).turn_off();
              id(buzzer_off_sequence).execute();
              ESP_LOGI("onoff", "Device OFF — nebulization schedules will be skipped");
            }

  # SW3 — START/STOP button (GPIO32, active LOW, internal pull-up)
  - platform: gpio
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button Start⁄Stop"
    id: btn_startstop
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - lambda: |-
            if (!id(device_on)) {
              ESP_LOGW("pump", "Device is OFF, blocking pump activation");
              return;
            }
            if (id(action_running)) {
              ESP_LOGI("pump", "Pump running — stopping");
              id(pump_start).stop();
              id(pump_stop).stop();
              id(pump_force_stop).execute();
              return;
            }
            id(pump_start).execute();

  - platform: gpio
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
    name: "Debug GPIO2 RTC SQW state"
    id: debug_gpio2

  # GPIO4 — unused, safe to probe
  - platform: gpio
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
    name: "Debug GPIO4"
    id: debug_gpio4
    entity_category: "diagnostic"

  # GPIO5 — P1 connector external I/O (boot strapping: must be HIGH at boot)
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: false   # no pullup — signal is externally driven
        pulldown: false # pulldown should be external on PCB
      inverted: true # HIGH = water OK, LOW = no water
    name: "Water Flow Missing"
    id: sensor_water_flow
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    on_press:
      then:
        - lambda: |-
            id(water_flow_missing_counter)++;
            ESP_LOGI("water", "Flow sensor LOW (no water) — count: %d", id(water_flow_missing_counter));
    on_release:
      then:
        - lambda: |-
            ESP_LOGI("water", "Flow sensor HIGH (water OK) — total events: %d", id(water_flow_missing_counter));

  # GPIO14 — undocumented, verify
  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
    name: "Debug GPIO14"
    id: debug_gpio14
    entity_category: "diagnostic"

  # GPIO16 — unused
  - platform: gpio
    pin:
      number: GPIO16
      mode:
        input: true
        pullup: true
    name: "Debug GPIO16"
    id: debug_gpio16
    entity_category: "diagnostic"

  # GPIO17 — unused
  - platform: gpio
    pin:
      number: GPIO17
      mode:
        input: true
        pullup: true
    name: "Debug GPIO17"
    id: debug_gpio17
    entity_category: "diagnostic"

output:
  # D6 — Green LED (activity in progress - e.g. nebulization)
  - platform: gpio
    pin: GPIO18
    id: out_led_green_d6


  # D3 — Blue LED (WiFi)
  - platform: gpio
    pin: GPIO19
    id: out_led_blue_d3


  # D7 — Red LED (alarm)
  - platform: gpio
    pin: GPIO25
    id: out_led_red_d7


  # D7 — Green LED (readiness)
  - platform: gpio
    pin: GPIO23
    id: out_led_green_d7


  # Buzzer on GPIO26 — frequency adjustable via number entity
  - platform: ledc
    pin: GPIO26
    id: out_buzzer
    frequency: 2500Hz

  # GPIO13 — virtual ON/OFF driver via Q4 transistor (hypothesis from RE docs)
  - platform: gpio
    pin: GPIO13
    id: sw_onoff

  # GPIO27 — pump relay driver R24->R23->Q7->X20->P-
  - platform: gpio
    pin: GPIO27
    id: sw_pump_on


select:
  - platform: template
    name: "Buzzer Frequency"
    id: buzzer_freq
    entity_category: "diagnostic"
    options:
      - "1500"
      - "2500"
      - "4000"
      - "5000"
    initial_option: "4000"
    optimistic: true
    on_value:
      then:
        - lambda: |-
            // Update LEDC frequency from dropdown selection
            float freq = atof(x.c_str());
            id(out_buzzer).update_frequency(freq);
  - platform: template
    name: "Buzzer Volume"
    id: buzzer_volume_select
    entity_category: "diagnostic"
    options:
      - "low"
      - "medium"
      - "high"
    initial_option: "medium"
    optimistic: true
    on_value:
      then:
        - lambda: |-
            if (x == "basso") { id(buzzer_duty) = 0.1; }
            if (x == "medio") { id(buzzer_duty) = 0.3; }
            if (x == "alto")  { id(buzzer_duty) = 0.5; }
            ESP_LOGI("buzzer", "Volume set to %s (duty=%.1f)", x.c_str(), id(buzzer_duty));

switch:
  - platform: template
    name: "Buzzer Enable"
    id: buzzer_enable_switch
    lambda: return id(buzzer_enabled);
    turn_on_action:
      - lambda: |-
          id(buzzer_enabled) = true;
          ESP_LOGI("buzzer", "Buzzer enabled");
    turn_off_action:
      - lambda: |-
          id(buzzer_enabled) = false;
          ESP_LOGI("buzzer", "Buzzer disabled");

  - platform: template
    name: "Buzzer Test"
    id: buzzer_test
    entity_category: "diagnostic"
    optimistic: true
    on_turn_on:
      - output.set_level:
          id: out_buzzer
          level: 50%   # 50% duty cycle = turn on - can't regulate it
    on_turn_off:
      - output.set_level:
          id: out_buzzer
          level: 0%

  - platform: output
    name: "Green LED - Nebulization in progress"
    id: sw_led_green_d6
    output: out_led_green_d6

  - platform: output
    name: "Blue LED - WiFi Connected"
    id: sw_led_blue_d3
    output: out_led_blue_d3

  - platform: output
    name: "Red LED - Lack water"
    id: sw_led_red_d7
    output: out_led_red_d7

  - platform: output
    name: "Green LED - Readiness"
    id: sw_led_green_d7
    output: out_led_green_d7


i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 100kHz
  id: bus_i2c

# --- RTC helpers -----------------------------------------------------------
globals:
  - id: rtc_address
    type: uint8_t
    restore_value: no
    initial_value: '0x6F'
  - id: device_on
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: action_running
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: pump_duration
    type: int
    restore_value: yes
    initial_value: '10'
  - id: buzzer_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: buzzer_duty
    type: float
    restore_value: yes
    initial_value: '0.3'
  - id: water_flow_missing_counter
    type: int
    restore_value: yes
    initial_value: '0'

number:
  - platform: template
    name: "Nebulization time (secondi)"
    id: pump_duration_number
    min_value: 10
    max_value: 120
    step: 5
    unit_of_measurement: "s"
    mode: slider
    lambda: return id(pump_duration);
    set_action:
      - lambda: |-
          id(pump_duration) = (int)x;
          ESP_LOGI("pump", "Duration set to %ds", id(pump_duration));

script:
  - id: rtc_write_time
    then:
      - lambda: |-
          auto dec2bcd = [](uint8_t v) -> uint8_t {
            return ((v / 10) << 4) | (v % 10);
          };

          ESP_LOGI("rtc_write", "rtc_write_time invoked");

          // Get current system time via POSIX
          time_t now_epoch = ::time(nullptr);
          if (now_epoch < 1000000000) {
            ESP_LOGW("rtc_write", "System time not valid (epoch=%lld), skipping RTC write", (long long)now_epoch);
            return;
          }

          struct tm *t = localtime(&now_epoch);
          ESP_LOGI("rtc_write", "Writing to RTC: %04d-%02d-%02d %02d:%02d:%02d",
            t->tm_year + 1900, t->tm_mon + 1, t->tm_mday,
            t->tm_hour, t->tm_min, t->tm_sec);

          uint8_t buf[8];
          buf[0] = 0x00;                                    // starting register
          buf[1] = dec2bcd(t->tm_sec)   | 0x80;            // seconds + ST=1 (oscillator start)
          buf[2] = dec2bcd(t->tm_min);
          buf[3] = dec2bcd(t->tm_hour);                    // 24h mode, bit6=0
          buf[4] = t->tm_wday == 0 ? 7 : t->tm_wday;      // tm_wday: 0=Sun → MCP: 1-7
          buf[5] = dec2bcd(t->tm_mday);
          buf[6] = dec2bcd(t->tm_mon + 1);
          buf[7] = dec2bcd(t->tm_year - 100);              // years since 2000

          i2c::ErrorCode err = id(bus_i2c).write(id(rtc_address), buf, 8, true);
          if (err == i2c::ERROR_OK) {
            ESP_LOGI("rtc_write", "RTC write OK");
          } else {
            ESP_LOGE("rtc_write", "MCP7940M write failed, error: %d", err);
          }

  - id: rtc_read_time
    then:
      - lambda: |-
          auto bcd2dec = [](uint8_t v) -> uint8_t {
            return ((v >> 4) * 10) + (v & 0x0F);
          };

          ESP_LOGI("rtc_read", "rtc_read_time invoked");

          uint8_t reg = 0x00;
          uint8_t data[7] = {0};

          id(bus_i2c).write(id(rtc_address), &reg, 1, false);
          i2c::ErrorCode err = id(bus_i2c).read(id(rtc_address), data, 7);

          if (err != i2c::ERROR_OK) {
            ESP_LOGE("rtc_read", "MCP7940M read failed, error: %d", err);
            return;
          }

          // Check ST bit (bit7 of seconds register) — oscillator must be running
          if (!(data[0] & 0x80)) {
            ESP_LOGW("rtc_read", "MCP7940M oscillator not running, skipping time restore");
            return;
          }

          struct tm t = {};
          t.tm_sec   = bcd2dec(data[0] & 0x7F);
          t.tm_min   = bcd2dec(data[1] & 0x7F);
          t.tm_hour  = bcd2dec(data[2] & 0x3F);
          t.tm_mday  = bcd2dec(data[4] & 0x3F);
          t.tm_mon   = bcd2dec(data[5] & 0x1F) - 1;  // tm_mon is 0-based
          t.tm_year  = bcd2dec(data[6]) + 100;        // years since 1900
          t.tm_isdst = -1;

          ESP_LOGI("rtc_read", "RTC raw read: %04d-%02d-%02d %02d:%02d:%02d",
            t.tm_year + 1900, t.tm_mon + 1, t.tm_mday,
            t.tm_hour, t.tm_min, t.tm_sec);

          time_t epoch = mktime(&t);
          if (epoch == -1) {
            ESP_LOGW("rtc_read", "mktime failed, invalid RTC data");
            return;
          }

          // Set system clock via POSIX
          struct timeval tv = { .tv_sec = epoch, .tv_usec = 0 };
          settimeofday(&tv, nullptr);

          ESP_LOGI("rtc_read", "RTC→system time set: epoch=%lld", (long long)epoch);

  - id: rtc_debug_poll
    then:
      - script.execute: rtc_read_time
      - lambda: |-
          // Log system time after RTC read for comparison
          time_t sys_epoch = ::time(nullptr);
          struct tm *s = localtime(&sys_epoch);
          ESP_LOGI("rtc_poll", "System : %04d-%02d-%02d %02d:%02d:%02d",
            s->tm_year + 1900, s->tm_mon + 1, s->tm_mday,
            s->tm_hour, s->tm_min, s->tm_sec);

  - id: pump_start
    then:
      - script.execute: buzzer_start_sequence

      - wait_until:
          condition:
            lambda: return !id(buzzer_start_sequence).is_running();

      - lambda: |-
          if (!id(device_on)) {
            ESP_LOGW("pump", "Device turned OFF during start sequence, aborting");
            id(pump_start).stop();
            return;
          }

      - lambda: |-
          ESP_LOGI("pump", "Pump ON — %ds cycle", id(pump_duration));
          id(action_running) = true;
          id(out_led_green_d6).turn_on();
          id(sw_pump_on).turn_on();

      - delay: !lambda return id(pump_duration) * 1000;  // ms

      - script.execute: pump_stop

  - id: pump_stop
    then:
      - output.set_level:
          id: out_buzzer
          level: 0%
      - script.execute: buzzer_stop_sequence
      - lambda: |-
          ESP_LOGI("pump", "Pump OFF — cycle complete");
          id(action_running) = false;
          id(sw_pump_on).turn_off();
          id(out_led_green_d6).turn_off();
      - script.execute: buzzer_stop_sequence

  - id: pump_force_stop
    then:
      - output.set_level:
          id: out_buzzer
          level: 0%
      - lambda: |-
          ESP_LOGI("pump", "Pump force stopped");
          id(action_running) = false;
          id(sw_pump_on).turn_off();
          id(out_led_green_d6).turn_off();
      - script.execute: buzzer_stop_sequence

  - id: buzzer_on_sequence
    then:
      - lambda: |-
          if (!id(buzzer_enabled)) {
            ESP_LOGI("buzzer", "Buzzer disabled, skipping");
            id(buzzer_on_sequence).stop();
            return;
          }
      # Three short rising-pitch beeps — power on confirmation
      - output.ledc.set_frequency:
          id: out_buzzer
          frequency: 2200Hz
      - output.set_level:
          id: out_buzzer
          level: 50%
      - delay: 120ms
      - output.set_level:
          id: out_buzzer
          level: 0%
      - delay: 40ms

      - output.ledc.set_frequency:
          id: out_buzzer
          frequency: 2400Hz
      - output.set_level:
          id: out_buzzer
          level: 50%
      - delay: 180ms
      - output.set_level:
          id: out_buzzer
          level: 0%
      - delay: 60ms

      - output.ledc.set_frequency:
          id: out_buzzer
          frequency: 2600Hz
      - output.set_level:
          id: out_buzzer
          level: 50%
      - delay: 160ms
      - output.set_level:
          id: out_buzzer
          level: 0%

  - id: buzzer_off_sequence
    then:
      - lambda: |-
          if (!id(buzzer_enabled)) {
            ESP_LOGI("buzzer", "Buzzer disabled, skipping");
            id(buzzer_on_sequence).stop();
            return;
          }
      - output.ledc.set_frequency:
          id: out_buzzer
          frequency: 2500Hz
      - output.set_level:
          id: out_buzzer
          level: 50%
      - delay: 100ms
      - output.set_level:
          id: out_buzzer
          level: 0%

  - id: buzzer_stop_sequence
    then:
      - lambda: |-
          if (!id(buzzer_enabled)) {
            ESP_LOGI("buzzer", "Buzzer disabled, skipping");
            id(buzzer_on_sequence).stop();
            return;
          }
      - output.ledc.set_frequency:
          id: out_buzzer
          frequency: 2200Hz
      - output.set_level:
          id: out_buzzer
          #level: 50%
          level: !lambda return id(buzzer_duty);
      - delay: 500ms
      - output.set_level:
          id: out_buzzer
          level: 0%

  - id: buzzer_beep
    parameters:
      frequency: float
      duration_ms: int
      pause_ms: int
    then:
      - output.turn_on: out_led_green_d6
      - if:
          condition:
            lambda: return id(buzzer_enabled);
          then:
            - output.ledc.set_frequency:
                id: out_buzzer
                frequency: !lambda return frequency;
            - output.set_level:
                id: out_buzzer
                level: 50%
      - delay: !lambda return duration_ms;
      - output.turn_off: out_led_green_d6
      - output.set_level:
          id: out_buzzer
          level: 0%
      - delay: !lambda return pause_ms;

  - id: buzzer_start_sequence
    then:
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 1030
          pause_ms: 940
      - wait_until:
          condition:
            lambda: return !id(buzzer_beep).is_running();
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 810
          pause_ms: 790
      - wait_until:
          condition:
            lambda: return !id(buzzer_beep).is_running();
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 660
          pause_ms: 640
      - wait_until:
          condition:
            lambda: return !id(buzzer_beep).is_running();
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 500
          pause_ms: 460
      - wait_until:
          condition:
            lambda: return !id(buzzer_beep).is_running();
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 330
          pause_ms: 280
      - wait_until:
          condition:
            lambda: return !id(buzzer_beep).is_running();
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 310
          pause_ms: 230
      - wait_until:
          condition:
            lambda: return !id(buzzer_beep).is_running();
      - script.execute:
          id: buzzer_beep
          frequency: 2600.0
          duration_ms: 280
          pause_ms: 200
      - wait_until:
          condition:
